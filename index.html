<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RINJANI4D — Prediksi Skor Bola</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-overlay"></div>

<header>
  <div class="logo">⚽ RINJANI<span>4D</span></div>
  <a href="https://rinjaniman.com" target="_blank" class="header-btn">Login</a>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1>Prediksi Skor <em>Hari Ini</em></h1>
    <p>Analisa pertandingan pilihan & akurat</p>

    <a href="https://rinjaniman.com" target="_blank" class="btn-primary">
      DAFTAR & MAIN SEKARANG
    </a>
  </div>
</section>

<main id="matches"></main>

<a href="https://rinjaniman.com" target="_blank" class="floating">
  🚀 MAIN SEKARANG
</a>

<script>
const data = [
  {
    league: "Premier League",
    matches: [
      {
        home:"Arsenal",
        homeLogo:"https://i.imgur.com/e4HFaAA.png",
        away:"Chelsea",
        awayLogo:"https://i.imgur.com/rRKLxQd.png",
        score:"2-1",
        time:"20:00"
      },
      {
        home:"Liverpool",
        homeLogo:"https://i.imgur.com/kufe8Br.png",
        away:"Manchester City",
        awayLogo:"https://i.imgur.com/X7oPQOJ.png",
        score:"1-1",
        time:"22:00"
      }
    ]
  }
];

function render(){
  let html = "";

  data.forEach(l => {
    html += `<h2>${l.league}</h2>`;

    l.matches.forEach(m => {
      html += `
      <div class="card">

        <div class="teams">
          <div class="team">
            <img src="${m.homeLogo}" alt="${m.home}">
            <span>${m.home}</span>
          </div>

          <div class="vs">VS</div>

          <div class="team">
            <img src="${m.awayLogo}" alt="${m.away}">
            <span>${m.away}</span>
          </div>
        </div>

        <div class="score">${m.score}</div>
        <div class="time">${m.time} WIB</div>

        <a href="https://rinjaniman.com" target="_blank" class="card-btn">
          Main Sekarang
        </a>

      </div>`;
    });
  });

  document.getElementById("matches").innerHTML = html;
}

render();
</script>

</body>
</html>
