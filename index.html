<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RINJANI4D — Analisa & Prediksi Bola</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-overlay"></div>

<header>
  <div class="logo">
    <img src="https://i.imgur.com/DuwlIfJ.png" alt="Logo RINJANI4D">
  </div>
  <div class="menu-container">
    <div class="burger" id="burger">
      <span></span><span></span><span></span>
    </div>
    <div class="dropdown-card" id="dropdownCard">
      <a href="https://rinjaniman.com">Login</a>
      <a href="https://rinjaniman.com/register">Daftar</a>
      <a href="https://rinjani-game-world--colombogelap.replit.app">Profil</a>
    </div>
  </div>
</header>

<div class="marquee-container">
    <div class="marquee-content">
        <marquee scrollamount="5">📢 RINJANI4D: Prediksi Terakurat Hari Ini! Update Jadwal Liga Inggris, UCL, dan Liga 1 Secara Real-Time.</marquee>
    </div>
</div>

<section class="banner-slider">
    <div class="slider-wrapper" id="slider">
        <div class="slide"><img src="https://i.imgur.com/VDY1cAE.png"></div>
        <div class="slide"><img src="https://i.imgur.com/NiAhn45.png"></div>
        <div class="slide"><img src="https://i.imgur.com/HEy90o8.png"></div>
        <div class="slide"><img src="https://i.imgur.com/ebLmmYA.png"></div>
        <div class="slide"><img src="https://i.imgur.com/GZux8Ft.png"></div>
    </div>
    <button class="prev-btn" id="prevBtn">&#10094;</button>
    <button class="next-btn" id="nextBtn">&#10095;</button>
    <div class="dots-container" id="dotsContainer"></div>
</section>

<section class="schedule-section">
    <div class="section-title">📊 ANALISA PELUANG (H | D | A)</div>
    
    <div class="tab-filter" id="tabFilter">
        <button class="tab-btn active" onclick="filterLeague('ALL')">SEMUA</button>
        <button class="tab-btn" onclick="filterLeague('EPL')">EPL</button>
        <button class="tab-btn" onclick="filterLeague('UCL')">UCL</button>
        <button class="tab-btn" onclick="filterLeague('LIGA 1')">LIGA 1</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Liga</th>
                    <th>Pertandingan</th>
                    <th>Win Prob (%)</th>
                </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
        </table>
    </div>
</section>

<main id="matches" class="match-grid"></main>

<a href="https://rinjaniman.com" target="_blank" class="floating">MAIN SEKARANG</a>

<script src="script.js"></script>
</body>
</html>
